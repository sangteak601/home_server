services:
  obsidian-couchdb:
    container_name: obsidian-couchdb
    image: couchdb:latest
    environment:
      - COUCHDB_USER=username  # update this
      - COUCHDB_PASSWORD=password  # update this
    volumes:
      - /path/to/data:/opt/couchdb/data
      - /path/to/etc/local.d:/opt/couchdb/etc/local.d
    ports:
      - "5984:5984"
    restart: unless-stopped